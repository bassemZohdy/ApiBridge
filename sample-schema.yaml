id: "customer-onboarding-bridge"
basePath: "/api/v1/onboarding"
flags:
  enableTelemetry: true
  securityLevel: "bearer-token"
  backendFlavor: "spring-boot"
  feFlavor: "react"
  deployTarget: "docker-compose"
  pagination:
    pageParam: "page"
    sizeParam: "size"
    defaultPageSize: 20
    sortParam: "sort"
    directionParam: "dir"
endpoints:
  - path: "/submissions"
    method: "GET"
    backendUrl: "https://internal-mesh.local/customer/submissions"
    telemetryName: "apibridge_onboarding_list"
    uiLayout:
      component: "List"
      columns:
        - field: "id"
          label: "ID"
          sortable: true
        - field: "email"
          label: "Email"
          sortable: true
        - field: "companyName"
          label: "Company"
          sortable: true
        - field: "status"
          label: "Status"
          sortable: false

  - path: "/submissions/{id}"
    method: "GET"
    backendUrl: "https://internal-mesh.local/customer/submissions/1"
    telemetryName: "apibridge_onboarding_view"
    uiLayout:
      component: "View"
      fields:
        - name: "id"
          label: "ID"
        - name: "email"
          label: "Email Address"
        - name: "companyName"
          label: "Company Name"
        - name: "status"
          label: "Status"

  - path: "/submissions/{id}"
    method: "PUT"
    backendUrl: "https://internal-mesh.local/customer/submissions/1"
    telemetryName: "apibridge_onboarding_update"
    uiLayout:
      component: "Form"
      fields:
        - name: "email"
          type: "string"
          label: "Email Address"
          required: true
        - name: "companyName"
          type: "string"
          label: "Company Name"
          required: true
        - name: "status"
          type: "string"
          label: "Status"
          required: false

  - path: "/submissions/{id}"
    method: "DELETE"
    backendUrl: "https://internal-mesh.local/customer/submissions/1"
    telemetryName: "apibridge_onboarding_delete"

  - path: "/initiate"
    method: "POST"
    backendUrl: "https://internal-mesh.local/customer/create"
    telemetryName: "apibridge_onboarding_initiate"
    uiLayout:
      component: "Form"
      fields:
        - name: "email"
          type: "string"
          label: "Email Address"
          required: true
        - name: "companyName"
          type: "string"
          label: "Company Name"
          required: true
